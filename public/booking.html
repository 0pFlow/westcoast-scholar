<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>document.documentElement.classList.add("js-loading");</script>

    <link rel="preload" as="image" href="../assets/bg.jpg" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/courses.css" />

    <script type="module" src="/src/api/app.js" defer></script>

    <link
      rel="icon"
      href="../assets/books-book-svgrepo-com.svg"
      type="image/x-icon"
    />

    <title>Bokningar - Westcoast Scholar</title>
  </head>

  <body>
    <div class="screen">
      <div class="pill"></div>

      <div class="hud courses-hud">
        <div class="top-row">
          <div class="left-stack">
            <div class="time-row">
              <div class="time" id="time">--:--</div>

              <div class="weather" id="weather">
                <img
                  id="weatherIcon"
                  class="weather-icon"
                  src="../assets/clear.svg"
                  alt="weather icon"
                  loading="eager"
                  decoding="async"
                />
                <span id="temp">--C</span>
              </div>
            </div>

            <div class="sub-row">
              <span class="hint">Westcoast Scholar</span>
            </div>

            <div class="nav-row" aria-label="Main navigation">
              <nav class="nav-tabs tabs">
                <a class="nav-tab tab" href="courses.html">Kurser</a>
                <a class="nav-tab tab is-active" href="booking.html" aria-current="page"
                  >Bokningar</a
                >
                <a class="nav-tab tab" href="admin.html">Admin</a>
              </nav>

              <button
                class="nav-tab nav-logout logout-btn"
                id="logoutBtn"
                type="button"
                aria-label="Logga ut"
                title="Logga ut"
              >
                <span class="nav-icon enter-icon" aria-hidden="true">&#x21AA;</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <main class="courses-main">
        <section class="courses-header">
          <h1 class="courses-title" id="bookingsTitle">Bokningar</h1>
          <p class="courses-subtitle">
            Hantera dina bokningar och se aktuell kursstatus.
          </p>
        </section>

        <section class="page-card booking-form-card" id="bookingFormSection" hidden>
          <h2 class="courses-title booking-form-title">Bekräfta bokning</h2>
          <p class="courses-subtitle" id="bookingCourseInfo">Välj kurs och fyll i uppgifter.</p>

          <article class="booking-preview" id="bookingPreview">
            <div class="booking-preview-media">
              <img
                id="bookingPreviewImage"
                class="booking-preview-image"
                src="../assets/javascript-fund.avif"
                alt="Kursbild"
                loading="lazy"
                decoding="async"
              />
            </div>
            <div class="booking-preview-body">
              <h3 class="booking-preview-title" id="bookingPreviewTitle">Kurs</h3>
              <p class="booking-preview-meta" id="bookingPreviewMeta">-</p>
              <p class="booking-preview-desc" id="bookingPreviewDesc">
                Praktisk kurs med tydlig progression och fokus på riktig tillämpning.
              </p>
            </div>
          </article>

          <form id="bookingForm" class="booking-form" novalidate>
            <div class="booking-form-grid">
              <label class="booking-field">
                <span>Kundnamn</span>
                <input
                  id="bookingCustomerName"
                  name="customerName"
                  class="booking-input"
                  type="text"
                  autocomplete="name"
                  required
                />
              </label>

              <label class="booking-field">
                <span>E-postadress</span>
                <input
                  id="bookingCustomerEmail"
                  name="email"
                  class="booking-input"
                  type="email"
                  autocomplete="email"
                  required
                />
              </label>

              <label class="booking-field">
                <span>Faktureringsadress</span>
                <input
                  id="bookingBillingAddress"
                  name="billingAddress"
                  class="booking-input"
                  type="text"
                  autocomplete="street-address"
                  required
                />
              </label>

              <label class="booking-field">
                <span>Mobilnummer</span>
                <input
                  id="bookingMobile"
                  name="mobile"
                  class="booking-input"
                  type="tel"
                  autocomplete="tel"
                  required
                />
              </label>
            </div>

            <div class="booking-form-actions">
              <button class="course-btn is-primary" type="submit">Boka kurs</button>
              <button class="course-btn booking-cancel-btn" id="bookingCancelBtn" type="button">
                Avbryt
              </button>
            </div>
          </form>
        </section>

        <section class="courses-grid" id="bookingsGrid" aria-live="polite"></section>
        <div class="courses-state" id="bookingsState" hidden>Laddar bokningar...</div>
      </main>
    </div>
  </body>
</html>
